name: DNF-Repo For GitHub
description: 'Create a dnf-compatible repository from GitHub release'
inputs:
  # Descriptions for these input variables can be found in `README.adoc`
  from_repository:
    required: true
    type: string
  from_version:
    required: true
    type: string
  to_repository:
    required: true
    type: string
  to_branch:
    default: 'gh-pages'
    type: string
  to_path:
    default: 'central'
    type: string
  max_attempts:
    default: 5
    type: string
  token:
    required: true
    type: string
runs:
  using: composite
  steps:
    - name: Add component to main repository
      run: |
        set -x;
        mkdir --parents "${{ runner.temp }}/rpm" "${{ runner.temp }}/component-repo";
        gh release download --repo "${{ inputs.from_repository }}" --pattern "*.rpm" --dir "${{ runner.temp }}/rpm/" "${{ inputs.from_version }}";
        sudo apt-get update && sudo apt-get --yes install createrepo-c;
        createrepo_c --no-database --baseurl=https://www.github.com --location-prefix="https://github.com/${{ inputs.from_repository }}/releases/download/" --outputdir="${{ runner.temp }}/component-repo" "${{ runner.temp }}/rpm";
        export attempt=1;
        while true; do
          echo "Attempt ${attempt}/${{ inputs.max_attempts }}";
          [ -d upstream/ ] && rm -rf upstream;
          bash -c '
            set -e;
            git clone --branch "${{ inputs.to_branch }}" -- "https://oauth2:${{ inputs.token }}@github.com/${{ inputs.to_repository }}.git" upstream;
            find "upstream/${{ inputs.to_path }}/";
            mergerepo_c --all --no-database --repo="upstream/${{ inputs.to_path }}/releases" --repo="${{ runner.temp }}/component-repo" --outputdir "upstream/${{ inputs.to_path }}/";
            echo "[teragrep-central-releases]
            name=teragrep-central-releases
            baseurl=https://raw.githubusercontent.com/${{ inputs.to_repository }}/refs/heads/${{ inputs.to_branch }}/${{ inputs.to_path }}/releases
            gpgcheck=0
            enabled=1" > "upstream/${{ inputs.to_path }}/releases/teragrep-central-releases.repo";
            cd "upstream/${{ inputs.to_path }}";
            git add .;
            git status,
            git commit --author="${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>" --message "Adds ${{ inputs.from_repository }} version ${{ inputs.from_version }}";
            git push;
          ' || export attempt="$((attempt+1))";
          if [[ "${attempt}" -ge "${{ inputs.max_attempts }}" ]]; then
            echo "Max attempts encountered, failing";
            exit 1;
          fi;
          sleep 5;
        done;
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
